name: Deploy to netcup

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      mode:
        description: "dry-run: nur anzeigen was passieren würde, ohne etwas zu übertragen"
        type: choice
        options:
          - dry-run
          - deploy
        default: dry-run

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Test SSH connectivity
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key -o UserKnownHostsFile=~/.ssh/known_hosts \
            -o BatchMode=yes -o ConnectTimeout=10 \
            "$SSH_USER@$SSH_HOST" "echo SSH_OK"

      - name: Deploy via SFTP
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'dry-run' && '--dry-run' || '' }}
        run: |
          echo "Modus: ${DRY_RUN:-echter Deploy}"
          lftp -e "
            set sftp:connect-program \"ssh -a -x -i \$HOME/.ssh/deploy_key -o UserKnownHostsFile=\$HOME/.ssh/known_hosts -o BatchMode=yes\";
            set sftp:auto-confirm yes;
            open -u \"$SSH_USER\", sftp://$SSH_HOST;
            mirror -R --verbose $DRY_RUN --exclude-glob .git/ --exclude-glob .github/ --exclude-glob .ddev/ --exclude-glob .env . \"$DEPLOY_PATH/\";
            bye
          "
