name: Deploy to netcup

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      mode:
        description: "dry-run: nur Paketinhalt anzeigen, keine Verbindung zum Server"
        type: choice
        options:
          - dry-run
          - deploy
        default: dry-run

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Package release
        run: |
          tar --exclude='.git' --exclude='.github' --exclude='.ddev' --exclude='.env' \
            -czf /tmp/deploy.tar.gz .

      - name: Preview package contents (dry run)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'dry-run'
        run: tar -tzf /tmp/deploy.tar.gz

      - name: Prepare SSH key
        if: github.event_name == 'release' || github.event.inputs.mode == 'deploy'
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Upload and extract on server
        if: github.event_name == 'release' || github.event.inputs.mode == 'deploy'
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          SSH_OPTS="-i $HOME/.ssh/deploy_key -o UserKnownHostsFile=$HOME/.ssh/known_hosts -o BatchMode=yes -o ConnectTimeout=10"
          scp $SSH_OPTS /tmp/deploy.tar.gz "$SSH_USER@$SSH_HOST:/tmp/deploy.tar.gz"
          ssh $SSH_OPTS "$SSH_USER@$SSH_HOST" \
            "tar -xzf /tmp/deploy.tar.gz -C '$DEPLOY_PATH' && rm /tmp/deploy.tar.gz"

      - name: Health check
        if: github.event_name == 'release' || github.event.inputs.mode == 'deploy'
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 https://teddyklinikgiessen.de/)
          echo "HTTP-Status: $status"
          if [ "$status" != "200" ]; then
            echo "::error::Health check fehlgeschlagen (HTTP $status) nach dem Deploy"
            exit 1
          fi
